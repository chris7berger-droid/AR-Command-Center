<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Command</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#b5a896;--bg2:#bfb3a1;--bg3:#c8bcaa;--bg4:#a89b88;
  --ink:#141110;--ink2:#231e19;--ink3:#352e26;--ink4:#554d42;--ink5:#746a5c;
  --border:rgba(28,24,20,0.22);--border2:rgba(28,24,20,0.32);--border3:rgba(28,24,20,0.14);
  --pop:#5BBD3F;--pop-dim:rgba(91,189,63,0.15);--pop-dark:#3D8A2A;--pop-deep:#2D6B1E;
  --red:#c62828;--red-dim:rgba(198,40,40,0.1);
  --amber:#e65100;--amber-dim:rgba(230,81,0,0.1);
  --green:#2e7d32;--green-dim:rgba(46,125,50,0.12);
  --blue:#1565c0;--blue-dim:rgba(21,101,192,0.1);
  --purple:#6d28d9;--purple-dim:rgba(109,40,217,0.1);
  --dark:#1c1814;--dark2:#28231d;
  --card:#d0c5b4;--card-hover:#d8cebe;
  --font:'Barlow',sans-serif;--fontd:'Barlow Condensed',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--ink2);line-height:1.6;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(60,50,35,0.04) 2px,rgba(60,50,35,0.04) 3px),
    repeating-linear-gradient(90deg,transparent,transparent 2px,rgba(60,50,35,0.04) 2px,rgba(60,50,35,0.04) 3px),
    url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='6' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"),
    radial-gradient(ellipse at 25% 15%,rgba(200,188,170,0.4) 0%,transparent 50%),
    radial-gradient(ellipse at 75% 85%,rgba(158,145,126,0.3) 0%,transparent 50%)}
h1,h2,h3,h4{font-family:var(--fontd);color:var(--ink);font-weight:700}

/* Upload Screen */
.upload-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.upload-box{text-align:center;max-width:460px}
.upload-title{font-family:var(--fontd);font-size:42px;font-weight:800;color:var(--ink);margin-bottom:2px;text-transform:uppercase;letter-spacing:0.04em}
.upload-title span{color:var(--pop-deep)}
.upload-sub{font-family:var(--fontd);font-size:14px;color:var(--ink4);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:36px}
.upload-area{border:2px dashed var(--border2);border-radius:14px;padding:44px 28px;background:rgba(28,24,20,0.03);cursor:pointer;transition:all 0.2s;display:block}
.upload-area:hover{border-color:var(--pop);background:var(--pop-dim)}
.upload-icon{font-size:44px;margin-bottom:14px;opacity:0.5}
.upload-text{font-size:15px;font-weight:600;color:var(--ink2);margin-bottom:6px}
.upload-hint{font-size:12px;color:var(--ink5)}
.upload-privacy{margin-top:28px;font-size:11px;color:var(--ink5);font-family:monospace}
.upload-error{margin-top:16px;padding:10px 16px;background:var(--red-dim);border:1px solid rgba(198,40,40,0.3);border-radius:8px;color:var(--red);font-size:13px}

/* Topbar */
.topbar{background:var(--dark);padding:0 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0;position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:12px;padding:12px 0}
.topbar-brand{font-family:var(--fontd);font-size:18px;font-weight:800;color:rgba(255,255,255,0.5);letter-spacing:0.04em}
.topbar-brand span{color:var(--pop)}
.topbar-date{font-size:10px;color:var(--ink5);font-family:monospace;background:var(--dark2);padding:3px 8px;border-radius:4px}
.topbar-right{display:flex;align-items:center;gap:10px;padding:12px 0}
.topbar-total{font-family:var(--fontd);font-size:12px;color:var(--ink5);letter-spacing:0.04em}
.topbar-total b{color:var(--pop)}
.new-report-btn{background:var(--dark2);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:5px 12px;color:rgba(255,255,255,0.5);font-family:var(--fontd);font-size:11px;cursor:pointer;font-weight:600;display:inline-block;letter-spacing:0.04em}
.new-report-btn:hover{background:rgba(255,255,255,0.1);color:var(--pop)}

/* Tabs */
.tab-bar{background:var(--dark);border-top:1px solid var(--dark2);padding:0 20px;display:flex;gap:0;position:sticky;top:44px;z-index:99}
.tab-btn{font-family:var(--fontd);padding:10px 20px;font-size:12px;font-weight:700;color:var(--ink5);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:all 0.15s;letter-spacing:0.06em;text-transform:uppercase}
.tab-btn:hover{color:rgba(255,255,255,0.7)}
.tab-btn.active{color:#fff;border-bottom-color:var(--pop)}
.tab-btn.tab-rpt{color:var(--pop-dark)}
.tab-btn.tab-rpt:hover{color:var(--pop)}
.tab-btn.tab-rpt.active{color:var(--pop);border-bottom-color:var(--pop)}
.tab-sep{width:1px;height:20px;background:rgba(255,255,255,0.08);margin:auto 4px}

/* Container */
.container{max-width:1260px;margin:0 auto;padding:20px 16px;position:relative;z-index:1}

/* Scorecards */
.scorecards{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.scorecard{flex:1 1 120px;min-width:120px;border:2px solid var(--border2);border-radius:10px;padding:16px 14px 14px;cursor:pointer;text-align:left;transition:all 0.2s;background:var(--card)}
.scorecard:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(28,24,20,0.12)}
.scorecard.active{transform:translateY(-2px)}
.sc-label{font-family:var(--fontd);font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink4);margin-bottom:6px}
.scorecard.active .sc-label{color:rgba(255,255,255,0.8)}
.sc-amount{font-family:var(--fontd);font-size:22px;font-weight:800;line-height:1.1;margin-bottom:4px}
.scorecard.active .sc-amount{color:#fff}
.sc-count{font-size:11px;color:var(--ink5)}
.scorecard.active .sc-count{color:rgba(255,255,255,0.65)}

/* Search */
.search-input{width:100%;max-width:340px;padding:9px 14px;margin-bottom:14px;border-radius:8px;border:2px solid var(--border2);font-size:13px;outline:none;color:var(--ink);background:var(--bg3);font-family:var(--font)}
.search-input:focus{border-color:var(--pop)}

/* Table */
.table-wrap{background:var(--card);border-radius:10px;border:2px solid var(--border2);overflow:hidden;box-shadow:0 2px 8px rgba(28,24,20,0.06)}
.t-header,.t-row{display:grid;grid-template-columns:minmax(160px,2fr) repeat(5,1fr) 1.2fr 28px;align-items:center;padding:10px 16px}
.t-header{background:var(--bg4);border-bottom:1px solid var(--border2);font-family:var(--fontd);font-size:10px;font-weight:700;letter-spacing:0.08em;color:var(--ink4);text-transform:uppercase;position:sticky;top:0;z-index:10}
.t-header div{cursor:pointer}.t-header div:not(:first-child){text-align:right}
.t-row{padding:12px 16px;cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.12s;font-size:13px}
.t-row:hover{background:var(--card-hover)}
.c-name{font-weight:600;color:var(--ink);display:flex;align-items:center;gap:8px;padding-right:8px;overflow:hidden}
.c-name span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sev-bar{width:3px;height:24px;border-radius:2px;flex-shrink:0}
.note-dot{width:6px;height:6px;border-radius:50%;background:var(--pop);flex-shrink:0}
.inv-count{font-size:10px;color:var(--ink5);background:var(--bg4);padding:1px 6px;border-radius:4px;flex-shrink:0}
.cell{text-align:right;font-weight:700;font-family:monospace;font-size:12px;color:var(--ink)}
.cell-e{text-align:right;color:var(--ink4);font-family:monospace;font-size:12px}
.cell-t{font-weight:700;color:var(--ink);text-align:right;font-family:monospace;font-size:12px}
.cell-a{text-align:center;color:var(--ink5);font-size:14px}
.t-footer{padding:10px 16px;background:var(--bg4);border-top:1px solid var(--border2);font-size:11px;color:var(--ink4);font-family:monospace;display:flex;justify-content:space-between}
.no-results{padding:36px;text-align:center;color:var(--ink5);font-size:13px}

/* Detail Panel */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(28,24,20,0.5);z-index:999}
.detail{position:fixed;top:0;right:0;bottom:0;width:min(620px,94vw);background:var(--card);box-shadow:-4px 0 30px rgba(28,24,20,0.2);z-index:1000;display:flex;flex-direction:column;animation:slideIn 0.25s ease-out}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.d-header{padding:20px 24px 16px;border-bottom:1px solid var(--border2);background:var(--bg2);flex-shrink:0}
.d-header-top{display:flex;justify-content:space-between;align-items:flex-start}
.d-label{font-family:var(--fontd);font-size:10px;font-weight:700;letter-spacing:0.1em;color:var(--ink4);text-transform:uppercase;margin-bottom:4px}
.d-name{font-family:var(--fontd);font-size:20px;font-weight:800;color:var(--ink);line-height:1.2}
.close-btn{background:var(--bg4);border:none;border-radius:8px;width:34px;height:34px;cursor:pointer;font-size:16px;color:var(--ink4);display:flex;align-items:center;justify-content:center}
.close-btn:hover{background:var(--ink5);color:var(--bg)}
.d-buckets{display:flex;gap:6px;margin-top:14px;flex-wrap:wrap}
.d-bucket{padding:6px 12px;border-radius:8px;cursor:pointer}
.d-bucket-l{font-family:var(--fontd);font-size:9px;font-weight:700;letter-spacing:0.05em}
.d-bucket-v{font-family:var(--fontd);font-size:14px;font-weight:800;margin-top:1px}
.d-total-bar{margin-top:12px;padding:8px 14px;background:var(--dark);border-radius:8px;display:flex;justify-content:space-between;align-items:center}
.d-total-l{color:var(--ink5);font-family:var(--fontd);font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase}
.d-total-v{font-family:var(--fontd);color:var(--pop);font-size:18px;font-weight:800}
.cust-email-bar{margin-top:10px;display:flex;gap:8px;align-items:center}
.cust-email-input{flex:1;padding:6px 10px;border-radius:6px;border:1px solid var(--border2);font-size:12px;outline:none;color:var(--ink);font-family:var(--font);background:var(--bg3)}
.cust-email-input:focus{border-color:var(--pop)}
.cust-email-save{padding:4px 10px;border-radius:5px;border:none;font-family:var(--fontd);font-size:10px;font-weight:700;cursor:pointer;background:var(--pop-deep);color:#fff;letter-spacing:0.04em}
.d-content{flex:1;overflow-y:auto;padding:16px 24px}

/* Invoice cards */
.inv-card{border-radius:8px;border:2px solid var(--border2);margin-bottom:8px;overflow:hidden;transition:border-color 0.2s;background:var(--bg2)}
.inv-card.expanded{border-color:var(--pop-dark);background:var(--card);box-shadow:0 2px 12px rgba(28,24,20,0.12)}
.inv-card.is-retention{border-left:4px solid var(--purple)}
.inv-card.is-collections{border-left:4px solid var(--ink4)}
.inv-card.is-goback{border-left:4px solid var(--amber)}
.coll-badge{font-family:var(--fontd);font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;background:rgba(28,24,20,0.06);color:var(--ink4);white-space:nowrap;letter-spacing:0.04em}
.goback-badge{font-family:var(--fontd);font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;background:var(--amber-dim);color:var(--amber);white-space:nowrap;letter-spacing:0.04em}
.inv-header{padding:12px 14px;cursor:pointer;transition:background 0.15s}
.inv-header:hover{background:var(--bg3)}
.inv-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px}
.inv-num{font-family:var(--fontd);font-size:13px;font-weight:700;color:var(--ink)}
.inv-type{font-family:var(--fontd);font-size:10px;color:#fff;background:var(--ink4);padding:2px 7px;border-radius:4px;font-weight:700;letter-spacing:0.04em}
.inv-type.payment{background:#1b7d3a;color:#fff}.inv-type.credit{background:#b45309;color:#fff}.inv-type.journal{background:#3949ab;color:#fff}
.inv-job{font-size:11px;color:var(--ink3);line-height:1.3;margin-bottom:8px}
.inv-meta{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;align-items:center}
.inv-meta-item{display:flex;align-items:center;gap:4px}
.inv-meta-label{color:var(--ink5);font-weight:600}
.inv-meta-val{color:var(--ink2);font-weight:600;font-family:monospace}
.inv-overdue{color:#b71c1c;font-weight:800}
.inv-due-soon{color:var(--green);font-weight:600}
.inv-expand{width:22px;height:22px;border-radius:6px;background:var(--bg4);color:var(--ink4);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;transition:all 0.2s}
.inv-card.expanded .inv-expand{background:var(--pop-deep);color:#fff;transform:rotate(90deg)}
.inv-notes-panel{border-top:2px solid var(--border2);padding:12px 14px;background:var(--bg3);display:none}
.inv-card.expanded .inv-notes-panel{display:block}
.inv-bal{font-family:var(--fontd);font-size:14px;font-weight:800;color:var(--ink)}
.age-badge{font-family:var(--fontd);font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:0.04em;white-space:nowrap}
.ret-badge{font-family:var(--fontd);font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;background:var(--purple-dim);color:var(--purple);white-space:nowrap;letter-spacing:0.04em}
.outreach-badge{font-family:var(--fontd);font-size:9px;font-weight:600;padding:2px 7px;border-radius:4px;white-space:nowrap;letter-spacing:0.04em}
.ob-1{background:var(--blue-dim);color:var(--blue)}.ob-2{background:var(--amber-dim);color:var(--amber)}.ob-3{background:var(--red-dim);color:var(--red)}.ob-0{background:var(--green-dim);color:var(--green)}

/* Notes */
.n-input{width:100%;padding:8px 12px;border-radius:6px;border:1px solid var(--border2);font-size:12px;resize:none;outline:none;color:var(--ink);font-family:var(--font);min-height:50px;transition:border-color 0.15s;background:var(--bg3)}
.n-input:focus{border-color:var(--pop)}
.n-actions{display:flex;justify-content:space-between;align-items:center;margin-top:5px}
.n-hint{font-size:9px;color:var(--ink5)}
.n-save{font-family:var(--fontd);padding:5px 14px;border-radius:5px;border:none;font-size:11px;font-weight:700;cursor:pointer;background:var(--ink4);color:var(--bg3);transition:all 0.15s;letter-spacing:0.04em}
.n-save.active{background:var(--pop-deep);color:#fff}
.n-card{padding:8px 12px;border-radius:6px;background:var(--pop-dim);border:1px solid rgba(48,207,172,0.2);margin-bottom:5px}
.n-card.sent-note{background:var(--green-dim);border-color:rgba(46,125,50,0.2)}
.n-text{font-size:12px;color:var(--pop-deep);line-height:1.4}
.sent-note .n-text{color:var(--green)}
.n-date{font-size:9px;color:var(--pop-dark);margin-top:3px;font-family:monospace}
.sent-note .n-date{color:rgba(46,125,50,0.6)}
.n-empty{font-size:11px;color:var(--ink5);text-align:center;padding:6px 0}
.cust-n-input{width:100%;padding:10px 14px;border-radius:8px;border:1px solid var(--border2);font-size:13px;resize:vertical;outline:none;color:var(--ink);font-family:var(--font);min-height:70px;background:var(--bg3)}
.cust-n-input:focus{border-color:var(--pop)}
.section-label{font-family:var(--fontd);font-size:10px;font-weight:700;letter-spacing:0.1em;color:var(--pop-deep);text-transform:uppercase;margin-bottom:10px}

/* Retention / flags toggles */
.ret-toggle{display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 0;user-select:none}
.ret-toggle input{display:none}
.ret-checkbox{width:18px;height:18px;border-radius:4px;border:2px solid var(--ink4);display:flex;align-items:center;justify-content:center;transition:all 0.15s;font-size:10px;color:transparent;flex-shrink:0}
.ret-toggle input:checked+.ret-checkbox{background:var(--purple);border-color:var(--purple);color:#fff}
.ret-toggle-label{font-size:13px;font-weight:600;color:var(--ink2)}

/* Email composer */
.email-section{margin-top:12px;padding-top:12px;border-top:1px dashed var(--border2)}
.email-tier-btns{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.tier-btn{font-family:var(--fontd);padding:6px 14px;border-radius:6px;border:2px solid var(--border2);font-size:11px;font-weight:700;cursor:pointer;background:var(--bg3);color:var(--ink4);transition:all 0.15s;letter-spacing:0.04em}
.tier-btn:hover{border-color:var(--pop);color:var(--pop-deep)}
.tier-btn.sel-0{border-color:var(--green);background:var(--green-dim);color:var(--green)}
.tier-btn.sel-1{border-color:var(--blue);background:var(--blue-dim);color:var(--blue)}
.tier-btn.sel-2{border-color:var(--amber);background:var(--amber-dim);color:var(--amber)}
.tier-btn.sel-3{border-color:var(--red);background:var(--red-dim);color:var(--red)}
.email-composer{background:var(--bg3);border:2px solid var(--border2);border-radius:8px;overflow:hidden;margin-bottom:8px}
.email-to{padding:8px 12px;border-bottom:1px solid var(--border);font-size:12px;display:flex;align-items:center;gap:6px}
.email-to-label{color:var(--ink5);font-weight:600;flex-shrink:0}
.email-to-val{color:var(--ink2);font-weight:600}
.email-subj-row{display:flex;align-items:center;border-bottom:1px solid var(--border)}
.email-subj-label{padding-left:12px;font-size:12px;color:var(--ink5);font-weight:600;flex-shrink:0}
.email-subj{flex:1;padding:8px 8px;border:none;font-size:12px;font-weight:600;color:var(--ink);outline:none;font-family:var(--font);background:transparent}
.email-body{width:100%;padding:10px 12px;border:none;font-size:12px;color:var(--ink2);outline:none;resize:vertical;min-height:160px;font-family:var(--font);line-height:1.6;background:transparent}
.email-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:4px}
.copy-btn{font-family:var(--fontd);padding:6px 14px;border-radius:6px;border:none;font-size:11px;font-weight:700;cursor:pointer;background:var(--dark);color:#fff;transition:all 0.15s;letter-spacing:0.04em}
.copy-btn:hover{background:var(--dark2)}.copy-btn.copied{background:var(--pop-deep)}
.mark-sent-btn{font-family:var(--fontd);padding:6px 14px;border-radius:6px;border:1px solid var(--pop-deep);font-size:11px;font-weight:700;cursor:pointer;background:transparent;color:var(--pop-deep);transition:all 0.15s;letter-spacing:0.04em}
.mark-sent-btn:hover{background:var(--pop-dim)}

/* Period Navigator */
.period-nav{display:flex;align-items:center;gap:12px;margin-bottom:0;flex-wrap:wrap;padding:12px 0}
.period-arrow{width:32px;height:32px;border-radius:8px;border:1px solid var(--border2);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--ink4);transition:all 0.15s}
.period-arrow:hover{border-color:var(--pop);color:var(--pop-deep)}
.period-label{font-family:var(--fontd);font-size:16px;font-weight:800;color:var(--ink);min-width:200px;text-align:center}
.period-modes{display:flex;gap:4px;margin-left:auto}
.period-mode{font-family:var(--fontd);padding:5px 12px;border-radius:6px;border:1px solid var(--border2);font-size:11px;font-weight:700;cursor:pointer;background:var(--card);color:var(--ink4);transition:all 0.15s;letter-spacing:0.04em}
.period-mode:hover{border-color:var(--pop);color:var(--pop-deep)}
.period-mode.active{background:var(--dark);color:#fff;border-color:var(--dark)}
.period-today{font-family:var(--fontd);padding:5px 12px;border-radius:6px;border:1px solid var(--pop);font-size:11px;font-weight:700;cursor:pointer;background:var(--pop-dim);color:var(--pop-deep);letter-spacing:0.04em}
.period-today:hover{background:var(--pop-dark);color:#fff}

/* Summary bar */
.summary-bar{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.summary-card{flex:1;min-width:140px;padding:16px;border-radius:10px;background:var(--card);border:2px solid var(--border2)}
.summary-card-label{font-family:var(--fontd);font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink4);margin-bottom:4px}
.summary-card-value{font-family:var(--fontd);font-size:24px;font-weight:800;color:var(--ink)}
.summary-card-sub{font-size:11px;color:var(--ink5);margin-top:2px}

/* CFF week bucket */
.cff-bucket{background:var(--card);border:2px solid var(--border2);border-radius:10px;margin-bottom:12px;overflow:hidden}
.cff-bucket-header{padding:12px 16px;background:var(--bg4);border-bottom:1px solid var(--border2);display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.cff-bucket-header:hover{background:var(--bg2)}
.cff-bucket-title{font-family:var(--fontd);font-size:13px;font-weight:700;color:var(--ink)}
.cff-bucket-amount{font-family:var(--fontd);font-size:15px;font-weight:800;color:var(--pop-deep);font-family:monospace}
.cff-bucket-count{font-size:11px;color:var(--ink5);margin-left:8px}
.cff-bucket.unscheduled .cff-bucket-header{background:var(--red-dim);border-bottom-color:rgba(198,40,40,0.2)}
.cff-bucket.unscheduled .cff-bucket-title{color:var(--red)}
.cff-bucket.unscheduled .cff-bucket-amount{color:var(--red)}
.cff-bucket-body{padding:8px}

/* CFF invoice row */
.cff-inv{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;transition:background 0.12s;flex-wrap:wrap}
.cff-inv:hover{background:var(--bg2)}
.cff-inv-info{flex:1;min-width:150px}
.cff-inv-customer{font-size:12px;font-weight:700;color:var(--ink)}
.cff-inv-detail{font-size:10px;color:var(--ink4);margin-top:2px}
.cff-inv-amount{font-family:var(--fontd);font-size:13px;font-weight:800;color:var(--ink);font-family:monospace;min-width:90px;text-align:right}
.cff-inv-date{display:flex;align-items:center;gap:6px}
.cff-date-input{padding:4px 8px;border-radius:5px;border:1px solid var(--border2);font-size:11px;font-family:monospace;color:var(--ink);outline:none;width:110px;background:var(--bg3)}
.cff-date-input:focus{border-color:var(--pop)}
.cff-date-save{font-family:var(--fontd);padding:3px 8px;border-radius:4px;border:none;font-size:10px;font-weight:700;cursor:pointer;background:var(--pop-deep);color:#fff;display:none;letter-spacing:0.04em}
.cff-date-save.show{display:inline-block}

/* Invoices tab list */
.inv-list-card{padding:12px 16px;background:var(--card);border:1px solid var(--border2);border-radius:8px;margin-bottom:6px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;cursor:pointer;transition:all 0.15s}
.inv-list-card:hover{background:var(--card-hover);transform:translateY(-1px)}
.inv-list-num{font-family:var(--fontd);font-size:13px;font-weight:700;color:var(--ink);min-width:80px}
.inv-list-customer{font-size:12px;font-weight:600;color:var(--ink2);flex:1;min-width:150px}
.inv-list-job{font-size:11px;color:var(--ink4);flex:2;min-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.inv-list-amount{font-family:var(--fontd);font-size:13px;font-weight:800;color:var(--ink);font-family:monospace;min-width:100px;text-align:right}
.inv-list-date{font-size:11px;color:var(--ink4);font-family:monospace;min-width:80px}

/* ====== HEALTH CHECK & ACTION PLAN TABS ====== */
.rpt-intro{font-size:13px;color:var(--ink3);margin-bottom:16px;max-width:700px}
.rpt-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:16px 0}
.rpt-scard{background:var(--card);border:2px solid var(--border2);border-radius:8px;padding:16px;text-align:center;transition:all 0.2s}
.rpt-scard:hover{box-shadow:0 4px 12px rgba(28,24,20,0.08);transform:translateY(-1px)}
.rpt-scard .rsc-l{font-family:var(--fontd);font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink4);margin-bottom:6px}
.rpt-scard .rsc-v{font-family:var(--fontd);font-size:26px;font-weight:800;color:var(--ink)}
.rpt-scard .rsc-v.accent{color:var(--pop-deep)}
.rpt-scard .rsc-v.red{color:var(--red)}
.rpt-sec{font-family:var(--fontd);margin:28px 0 8px;font-size:18px;font-weight:800;color:var(--ink);display:flex;align-items:center;gap:10px;text-transform:uppercase;letter-spacing:0.04em}
.rpt-sec::before{content:'';width:20px;height:2px;background:var(--pop)}
.rpt-sec-desc{font-size:13px;color:var(--ink4);margin-bottom:14px}
/* Bucket bar */
.rpt-buckets{display:flex;gap:2px;height:48px;border-radius:6px;overflow:hidden;margin:12px 0 6px;box-shadow:0 2px 8px rgba(28,24,20,0.1)}
.rpt-bucket{display:flex;align-items:center;justify-content:center;flex-direction:column}
.rpt-bucket .rb-l{font-family:var(--fontd);font-size:9px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:rgba(255,255,255,0.85)}
.rpt-bucket .rb-v{font-family:var(--fontd);font-size:13px;font-weight:800;color:#fff}
.rpt-legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px}
.rpt-legend span{font-size:11px;color:var(--ink3);display:flex;align-items:center;gap:5px}
/* Anomaly cards */
.rpt-acard{background:var(--card);border:2px solid var(--border2);border-radius:8px;padding:14px 16px;display:grid;grid-template-columns:72px 1fr auto;gap:12px;align-items:start;cursor:pointer;transition:all 0.15s;border-left:3px solid transparent;margin-bottom:8px}
.rpt-acard:hover{box-shadow:0 2px 10px rgba(28,24,20,0.06);transform:translateY(-1px)}
.rpt-acard.high{border-left-color:var(--red)}.rpt-acard.medium{border-left-color:var(--amber)}.rpt-acard.info{border-left-color:var(--blue)}
.rpt-acard .ra-badge{font-family:var(--fontd);font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:3px 8px;border-radius:4px;text-align:center}
.rpt-acard.high .ra-badge{background:var(--red-dim);color:var(--red)}.rpt-acard.medium .ra-badge{background:var(--amber-dim);color:var(--amber)}.rpt-acard.info .ra-badge{background:var(--blue-dim);color:var(--blue)}
.rpt-acard .ra-type{font-size:10px;color:var(--ink5);margin-top:2px}.rpt-acard .ra-cust{font-family:var(--fontd);font-size:15px;font-weight:700;color:var(--ink);margin-bottom:2px}
.rpt-acard .ra-det{font-size:12px;color:var(--ink2);line-height:1.5}.rpt-acard .ra-action{font-size:12px;color:var(--pop-deep);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);display:none;font-weight:500}
.rpt-acard.open .ra-action{display:block}
.rpt-acard .ra-amt{font-family:var(--fontd);font-size:17px;font-weight:800;color:var(--ink);white-space:nowrap}
/* Filters */
.rpt-filters{display:flex;gap:6px;margin:12px 0;flex-wrap:wrap}
.rpt-fbtn{font-family:var(--fontd);font-size:11px;font-weight:700;letter-spacing:0.06em;padding:5px 12px;border-radius:4px;border:1px solid var(--border2);background:transparent;color:var(--ink4);cursor:pointer;transition:all 0.15s}
.rpt-fbtn:hover{border-color:var(--ink3);color:var(--ink)}.rpt-fbtn.active{background:var(--pop-dim);border-color:var(--pop);color:var(--pop-deep)}
/* Customer table */
.rpt-ctable{width:100%;border-collapse:collapse;margin:12px 0 24px}
.rpt-ctable th{font-family:var(--fontd);font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink5);text-align:left;padding:8px 10px;border-bottom:1px solid var(--border2)}
.rpt-ctable td{padding:10px;border-bottom:1px solid var(--border);font-size:12px;color:var(--ink2)}.rpt-ctable tr:hover{background:var(--bg2)}
.rpt-ctable .rc-name{font-weight:600;color:var(--ink)}.rpt-ctable .rc-amt{font-family:var(--fontd);font-weight:700;font-size:14px;color:var(--ink)}
.rpt-ctable .rc-bar{height:4px;border-radius:2px;background:var(--pop);min-width:3px}
/* Glossary */
.rpt-glossary{background:var(--card);border:2px solid var(--border2);border-radius:8px;padding:20px 24px;margin:24px 0}
.rpt-glossary h4{font-family:var(--fontd);font-size:15px;margin-bottom:12px;color:var(--ink);text-transform:uppercase;letter-spacing:0.04em}
.rpt-gterm{margin-bottom:10px}
.rpt-gterm dt{font-family:var(--fontd);font-size:12px;font-weight:700;color:var(--pop-deep);text-transform:uppercase;letter-spacing:0.04em}
.rpt-gterm dd{font-size:12px;color:var(--ink2);margin-top:1px}
/* Action plan items */
.rpt-item{background:var(--card);border:2px solid var(--border2);border-radius:6px;padding:14px 16px;margin-bottom:6px;display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start;cursor:pointer;transition:all 0.15s;border-left:3px solid transparent}
.rpt-item:hover{box-shadow:0 2px 8px rgba(28,24,20,0.06);transform:translateY(-1px)}
.rpt-item .ri-cust{font-family:var(--fontd);font-size:14px;font-weight:700;color:var(--ink)}.rpt-item .ri-det{font-size:12px;color:var(--ink4);margin-top:2px}
.rpt-item .ri-fix{font-size:12px;color:var(--pop-deep);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);display:none;font-weight:500}
.rpt-item.open .ri-fix{display:block}
.rpt-item .ri-amt{font-family:var(--fontd);font-size:17px;font-weight:800;color:var(--ink);white-space:nowrap;text-align:right}.rpt-item .ri-amt.neg{color:var(--red)}
/* Action plan sub-tabs */
.rpt-stabs{display:flex;gap:4px;margin:16px 0 0}
.rpt-stab{font-family:var(--fontd);font-size:13px;font-weight:700;padding:10px 20px;border:1px solid var(--border2);border-radius:8px 8px 0 0;background:var(--bg2);color:var(--ink4);cursor:pointer;transition:all 0.15s;border-bottom:none;letter-spacing:0.04em;text-transform:uppercase}
.rpt-stab:hover{color:var(--ink)}.rpt-stab.active{background:var(--card);color:var(--ink);border-color:var(--border2)}
.rpt-spanel{display:none;background:var(--card);border:1px solid var(--border2);border-radius:0 8px 8px 8px;padding:20px;margin-bottom:20px}
.rpt-spanel.active{display:block}
.rpt-slabel{font-family:var(--fontd);font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:6px 14px;border-radius:4px;display:inline-flex;align-items:center;gap:6px;margin:18px 0 8px}
.rpt-slabel.red{background:var(--red-dim);color:var(--red)}.rpt-slabel.amber{background:var(--amber-dim);color:var(--amber)}.rpt-slabel.green{background:var(--green-dim);color:var(--green)}.rpt-slabel.blue{background:var(--blue-dim);color:var(--blue)}.rpt-slabel.gray{background:rgba(28,24,20,0.06);color:var(--ink3)}
.rpt-sdesc{font-size:12px;color:var(--ink4);margin-bottom:12px;max-width:660px}
/* Chase cash blocks */
.rpt-cblock{background:var(--card);border:2px solid var(--border2);border-radius:6px;margin-bottom:8px;overflow:hidden;transition:all 0.15s}
.rpt-cblock:hover{box-shadow:0 2px 8px rgba(28,24,20,0.06)}
.rpt-chead{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.rpt-chead .rc-cn{font-family:var(--fontd);font-size:15px;font-weight:700;color:var(--ink)}.rpt-chead .rc-cn small{font-weight:400;color:var(--ink5);font-size:11px;margin-left:6px}
.rpt-chead .rc-ct{font-family:var(--fontd);font-size:17px;font-weight:800;color:var(--ink)}
.rpt-cinvs{display:none;border-top:1px solid var(--border);padding:0 16px}
.rpt-cblock.open .rpt-cinvs{display:block}
.rpt-cinv{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border3);font-size:11px;color:var(--ink4)}
.rpt-cinv:last-child{border-bottom:none}.rpt-cinv .rc-ca{font-family:var(--fontd);font-weight:700;color:var(--ink);font-size:14px}
/* Tracker upload bar */
.rpt-tracker-bar{background:var(--bg2);border:2px solid var(--border2);border-radius:8px;padding:12px 16px;margin:16px 0;display:flex;align-items:center;justify-content:space-between;gap:12px}
.rpt-tracker-bar.loaded{background:var(--pop-dim);border-color:rgba(48,207,172,0.3)}
.rpt-tracker-info{font-size:12px;color:var(--ink3)}.rpt-tracker-info strong{color:var(--ink)}.rpt-tracker-info small{display:block;color:var(--ink5);font-size:11px;margin-top:2px}
.rpt-tracker-upload{font-family:var(--fontd);background:var(--pop-deep);border:none;border-radius:6px;padding:7px 16px;color:#fff;font-size:11px;cursor:pointer;font-weight:700;display:inline-block;letter-spacing:0.04em}
.rpt-tracker-upload:hover{background:var(--pop-dark)}
/* Report footer */
.rpt-foot{background:var(--dark);padding:16px;border-radius:8px;margin:28px 0 8px;text-align:center;font-size:11px;color:rgba(255,255,255,0.3)}.rpt-foot span{color:var(--pop)}

.hidden{display:none !important}

/* Follow-Up Badge & Panel */
.fup-wrap{position:relative;display:inline-flex;align-items:center}
.fup-btn{font-family:var(--fontd);font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:rgba(255,255,255,0.6);cursor:pointer;display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:6px;border:1px solid rgba(255,255,255,0.15);transition:all 0.15s}
.fup-btn:hover{background:rgba(255,255,255,0.08);color:#fff}
#fup-badge{display:none;align-items:center;justify-content:center;min-width:20px;height:20px;border-radius:10px;background:var(--pop);color:#fff;font-family:var(--fontd);font-size:11px;font-weight:800;padding:0 6px}
#fup-panel{position:absolute;top:100%;right:0;width:420px;max-height:70vh;overflow-y:auto;background:var(--card);border:2px solid var(--border2);border-radius:10px;box-shadow:0 8px 32px rgba(28,24,20,0.18);z-index:200;display:none;margin-top:8px}
#fup-panel.fup-open{display:block}
.fup-empty{padding:24px;text-align:center;color:var(--ink4);font-size:13px}
.fup-item{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.12s}
.fup-item:last-child{border-bottom:none}
.fup-item:hover{background:var(--card-hover)}
.fup-urg{font-family:var(--fontd);font-size:9px;font-weight:700;letter-spacing:0.06em;margin-bottom:4px}
.fup-urgent .fup-urg{color:var(--red)}
.fup-followup .fup-urg{color:var(--amber)}
.fup-checkin .fup-urg{color:var(--blue)}
.fup-cust{font-weight:700;color:var(--ink);font-size:13px}
.fup-inv{font-family:monospace;font-size:11px;color:var(--ink3);margin-top:2px}
.fup-reason{font-size:12px;color:var(--ink3);margin-top:4px}
.fup-action{font-size:11px;color:var(--pop-deep);font-weight:700;margin-top:4px}

/* Accountant Review */
.inv-card.is-acct{border-left:4px solid #1565c0}
.acct-badge{font-family:var(--fontd);font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;background:var(--blue-dim);color:var(--blue);white-space:nowrap;letter-spacing:0.04em}
.acct-export-btn{font-family:var(--fontd);font-size:10px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;padding:5px 12px;border-radius:5px;border:none;background:#1565c0;color:#fff;cursor:pointer;margin-top:6px;display:inline-block}
.acct-export-btn:hover{background:#0d47a1}
</style>
</head>
<body>
<div id="upload-screen" class="upload-screen">
  <div class="upload-box">
    <div class="upload-title">AR Command</div>
    <div class="upload-sub">Accounts Receivable Command Center</div>
    <label class="upload-area">
      <input type="file" id="file-input" accept=".xlsx,.xls,.csv" style="display:none">
      <div class="upload-icon">📊</div>
      <div class="upload-text" id="upload-label">Click to upload your QB A/R Aging Detail Report</div>
      <div class="upload-hint">.xlsx or .csv</div>
    </label>
    <div id="upload-error" class="upload-error hidden"></div>
    <div class="upload-privacy">Your data stays in your browser. Nothing is sent anywhere.</div>
  </div>
</div>
<div id="dashboard" class="hidden">
  <div class="topbar">
    <div class="topbar-left"><span class="topbar-brand">AR Command</span><span class="topbar-date" id="report-date"></span></div>
    <div class="topbar-right">
      <div class="fup-wrap"><div class="fup-btn" onclick="toggleFollowUpPanel()">Follow-Ups <span id="fup-badge">0</span></div><div id="fup-panel"></div></div>
      <span class="topbar-total">Total: <b id="grand-total"></b></span>
      <label class="new-report-btn"><input type="file" accept=".xlsx,.xls,.csv" id="new-report-input" style="display:none">New Report</label>
    </div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="aging">Aging</button>
    <button class="tab-btn" data-tab="invoices">Invoices</button>
    <button class="tab-btn" data-tab="cff">Cash Flow Forecast</button>
    <div class="tab-sep"></div>
    <button class="tab-btn tab-rpt" data-tab="health">Health Check</button>
    <button class="tab-btn tab-rpt" data-tab="action">Action Plan</button>
  </div>
  <!-- Aging Tab -->
  <div class="container tab-content" id="tab-aging">
    <div class="scorecards" id="scorecards"></div>
    <input type="text" class="search-input" id="search-input" placeholder="Search customers...">
    <div class="table-wrap">
      <div class="t-header"><div data-sort="name">Customer</div><div data-sort="current">Current</div><div data-sort="days30">1-30</div><div data-sort="days60">31-60</div><div data-sort="days90">61-90</div><div data-sort="over90">91+</div><div data-sort="total">Total</div><div></div></div>
      <div id="table-body"></div>
      <div class="t-footer"><span id="footer-count"></span><span style="font-weight:700;color:var(--ink)">Filtered: <span id="footer-total"></span></span></div>
    </div>
  </div>
  <!-- Invoices Tab -->
  <div class="container tab-content hidden" id="tab-invoices">
    <div id="inv-period-nav"></div>
    <div id="inv-summary"></div>
    <div class="table-wrap" style="max-height:calc(100vh - 320px);overflow-y:auto">
      <div id="inv-list"></div>
    </div>
  </div>
  <!-- CFF Tab -->
  <div class="container tab-content hidden" id="tab-cff">
    <div id="cff-period-nav"></div>
    <div id="cff-summary"></div>
    <div class="table-wrap" style="max-height:calc(100vh - 320px);overflow-y:auto;padding:8px">
      <div id="cff-body"></div>
    </div>
  </div>
  <!-- Health Check Tab -->
  <div class="container tab-content hidden" id="tab-health">
    <div id="health-content"></div>
  </div>
  <!-- Action Plan Tab -->
  <div class="container tab-content hidden" id="tab-action">
    <div id="action-content"></div>
  </div>
</div>
<!-- Detail Panel -->
<div id="overlay" class="overlay hidden"></div>
<div id="detail-panel" class="detail hidden">
  <div class="d-header">
    <div class="d-header-top"><div><div class="d-label">Customer</div><div class="d-name" id="d-name"></div></div><button class="close-btn" id="close-detail">&times;</button></div>
    <div class="d-buckets" id="d-buckets"></div>
    <div class="d-total-bar"><span class="d-total-l">TOTAL OPEN</span><span class="d-total-v" id="d-total"></span></div>
    <div class="cust-email-bar"><span style="font-family:var(--fontd);font-size:10px;font-weight:700;color:var(--ink4);letter-spacing:0.08em">EMAIL:</span><input type="email" class="cust-email-input" id="cust-email" placeholder="customer@email.com"><button class="cust-email-save" id="save-email-btn">Save</button></div>
  </div>
  <div class="d-content" id="d-content"></div>
</div>
<script>
// AR Command v7
var customerList=[], allInvoices=[], notes={}, retFlags={}, collFlags={}, gobackFlags={}, acctFlags={}, custEmails={}, expectedDates={};
var currentFilter="all", searchTerm="", sortBy="total", sortDir="desc";
var selectedCustomer=null, expandedInv=null, detailBucketFilter=null;
var activeTab="aging";
var invPeriodMode="week", invPeriodOffset=0;
var cffPeriodMode="week", cffPeriodOffset=0, cffFilter="scheduled";
var COL={cur:{bg:"#059669",lt:"#d1fae5",tx:"#065f46"},d30:{bg:"#d97706",lt:"#fef3c7",tx:"#92400e"},d60:{bg:"#ea580c",lt:"#ffedd5",tx:"#9a3412"},d90:{bg:"#dc2626",lt:"#fee2e2",tx:"#991b1b"},o90:{bg:"#7c2d12",lt:"#fecaca",tx:"#7f1d1d"},ret:{bg:"#7c3aed",lt:"#ede9fe",tx:"#5b21b6"},coll:{bg:"#475569",lt:"#f1f5f9",tx:"#334155"},goback:{bg:"#b45309",lt:"#fef3c7",tx:"#78350f"}};

// === HELPERS ===
function fmt(n){if(!n)return"\u2014";var neg=n<0;var s=Math.abs(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});return neg?"($"+s+")":"$"+s;}
function fmtShort(n){if(!n)return"$0";var a=Math.abs(n);if(a>=1e6)return"$"+(n/1e6).toFixed(1)+"M";if(a>=1e3)return"$"+(n/1e3).toFixed(1)+"K";return"$"+n.toFixed(0);}
function fmtTs(ts){return new Date(ts).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric",hour:"numeric",minute:"2-digit"});}
function escH(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function parseNum(v){if(v==null||v==="")return 0;if(typeof v==="number")return v;var s=String(v).replace(/[$,\s]/g,"");if(s.charAt(0)==="("&&s.charAt(s.length-1)===")")s="-"+s.slice(1,-1);var n=parseFloat(s);return isNaN(n)?0:n;}
function parseDateCell(v){if(!v)return"";if(typeof v==="number"){var d=new Date((v-25569)*86400000);return(d.getMonth()+1)+"/"+d.getDate()+"/"+d.getFullYear();}return String(v).trim();}
function parseDate(ds){if(!ds)return null;var p=ds.split("/");if(p.length!==3)return null;return new Date(parseInt(p[2]),parseInt(p[0])-1,parseInt(p[1]));}
function toDateStr(d){return(d.getMonth()+1)+"/"+d.getDate()+"/"+d.getFullYear();}
function toISODate(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function fromISO(s){if(!s)return null;var p=s.split("-");return new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));}
function daysOverdue(ds){if(!ds)return 0;var d=parseDate(ds);if(!d)return 0;var now=new Date();now.setHours(0,0,0,0);return Math.floor((now-d)/86400000);}
function invKey(c,num,date){return c+"|"+(num||"_")+"|"+(date||"_");}
function custNoteKey(c){return c+"|__gen__";}

// === DATE PERIOD HELPERS ===
function getWeekStart(d){var dt=new Date(d);dt.setHours(0,0,0,0);var day=dt.getDay();var diff=day===0?6:day-1;dt.setDate(dt.getDate()-diff);return dt;}
function getMonthStart(d){return new Date(d.getFullYear(),d.getMonth(),1);}
function getQuarterStart(d){var q=Math.floor(d.getMonth()/3);return new Date(d.getFullYear(),q*3,1);}
function getYearStart(d){return new Date(d.getFullYear(),0,1);}
function addPeriod(d,mode,n){var dt=new Date(d);if(mode==="week")dt.setDate(dt.getDate()+n*7);else if(mode==="month")dt.setMonth(dt.getMonth()+n);else if(mode==="quarter")dt.setMonth(dt.getMonth()+n*3);else dt.setFullYear(dt.getFullYear()+n);return dt;}
function getPeriodRange(mode,offset){
  var now=new Date();now.setHours(0,0,0,0);
  var start;
  if(mode==="week")start=getWeekStart(now);
  else if(mode==="month")start=getMonthStart(now);
  else if(mode==="quarter")start=getQuarterStart(now);
  else start=getYearStart(now);
  start=addPeriod(start,mode,offset);
  var end=addPeriod(start,mode,1);
  return{start:start,end:end};
}
function periodLabel(mode,offset){
  var r=getPeriodRange(mode,offset);
  var s=r.start;var e=new Date(r.end.getTime()-86400000);
  var opts={month:"short",day:"numeric"};
  if(mode==="week")return"Week of "+s.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
  if(mode==="month")return s.toLocaleDateString("en-US",{month:"long",year:"numeric"});
  if(mode==="quarter"){var q=Math.floor(s.getMonth()/3)+1;return"Q"+q+" "+s.getFullYear();}
  return s.getFullYear().toString();
}

// === RETENTION ===
function autoDetectRetention(inv){var num=(inv.num||"").toUpperCase();var job=(inv.job||"").toUpperCase();var full=(inv.fullName||"").toUpperCase();return num.indexOf("RET")>-1||job.indexOf("RETENTION")>-1||job.indexOf("RENTENTION")>-1||full.indexOf("RETENTION")>-1||full.indexOf("RENTENTION")>-1;}
function isRetention(inv,cn){var k=invKey(cn,inv.num,inv.date);if(retFlags[k]!==undefined)return retFlags[k];return autoDetectRetention(inv);}
function isAccountantReview(inv,cn){var k=invKey(cn,inv.num,inv.date);return!!acctFlags[k];}
function getCustAcctTotal(c){var t=0;c.invoices.forEach(function(inv){if(isAccountantReview(inv,c.name))t+=inv.openBalance;});return t;}
function isCollections(inv,cn){var k=invKey(cn,inv.num,inv.date);return!!collFlags[k];}
function isGoback(inv,cn){var k=invKey(cn,inv.num,inv.date);return!!gobackFlags[k];}
function getCustBuckets(c,exRet){if(!exRet)return{current:c.current,days30:c.days30,days60:c.days60,days90:c.days90,over90:c.over90,total:c.total};var r={current:0,days30:0,days60:0,days90:0,over90:0,total:0};c.invoices.forEach(function(inv){if(!isRetention(inv,c.name)&&!isCollections(inv,c.name)&&!isGoback(inv,c.name)){r[inv.bucket]+=inv.openBalance;r.total+=inv.openBalance;}});return r;}
function getCustRetTotal(c){var t=0;c.invoices.forEach(function(inv){if(isRetention(inv,c.name)&&!isCollections(inv,c.name)&&!isGoback(inv,c.name))t+=inv.openBalance;});return t;}
function getCustCollTotal(c){var t=0;c.invoices.forEach(function(inv){if(isCollections(inv,c.name))t+=inv.openBalance;});return t;}
function getCustGobackTotal(c){var t=0;c.invoices.forEach(function(inv){if(isGoback(inv,c.name))t+=inv.openBalance;});return t;}

function getLastOutreach(cn,inv){var k=invKey(cn,inv.num,inv.date);var n=notes[k]||[];for(var i=n.length-1;i>=0;i--){if(n[i].outreach)return n[i];}return null;}
function outreachBadgeHtml(cn,inv){var last=getLastOutreach(cn,inv);if(!last)return"";var cls=last.outreach===0?"ob-0":last.outreach===1?"ob-1":last.outreach===2?"ob-2":"ob-3";var label=last.outreach===0?"Pre-Due":last.outreach===1?"1st":last.outreach===2?"2nd":"3rd";var ago=Math.floor((Date.now()-last.ts)/86400000);var agoStr=ago===0?"today":ago===1?"1d ago":ago+"d ago";return'<span class="outreach-badge '+cls+'">'+label+' sent '+agoStr+'</span>';}

// === PARSE ===
function parseDetailReport(rows){
  var custs={};var bucket="current";
  var bMap={"91 or more days past due":"over90","61 - 90 days past due":"days90","31 - 60 days past due":"days60","1 - 30 days past due":"days30","CURRENT":"current"};
  var hdr=false;allInvoices=[];
  for(var i=0;i<rows.length;i++){
    var row=rows[i];var c0=String(row[0]||"").trim();
    if(!hdr){if(String(row[1]||"").trim()==="Date")hdr=true;continue;}
    if(c0&&bMap[c0]!==undefined){bucket=bMap[c0];continue;}
    if(c0.indexOf("Total for")===0)continue;if(String(row[1]||"").trim()==="TOTAL")continue;if(!row[1]&&!row[2])continue;
    var date=parseDateCell(row[1]),txnType=String(row[2]||"").trim(),num=String(row[3]||"").trim();
    var fullName=String(row[4]||"").trim(),location=String(row[5]||"").trim(),dueDate=parseDateCell(row[6]);
    var amount=parseNum(row[7]),openBal=parseNum(row[8]);
    var cn,jn;var ci=fullName.indexOf(":");
    if(ci>-1){cn=fullName.substring(0,ci).trim();jn=fullName.substring(ci+1).trim();}else{cn=fullName;jn="";}
    if(!cn)continue;
    if(!custs[cn])custs[cn]={name:cn,invoices:[],current:0,days30:0,days60:0,days90:0,over90:0,total:0};
    var inv={date:date,type:txnType,num:num,job:jn,fullName:fullName,location:location,dueDate:dueDate,amount:amount,openBalance:openBal,bucket:bucket,customer:cn};
    custs[cn].invoices.push(inv);custs[cn][bucket]+=openBal;custs[cn].total+=openBal;
    allInvoices.push(inv);
  }
  return Object.values(custs);
}

function getTotals(){var t={current:0,days30:0,days60:0,days90:0,over90:0,total:0,retention:0,collections:0,goback:0,acct:0,cCur:0,c30:0,c60:0,c90:0,cO90:0,cRet:0,cColl:0,cGo:0,cAcct:0};customerList.forEach(function(c){var ret=getCustRetTotal(c);t.retention+=ret;if(ret)t.cRet++;var coll=getCustCollTotal(c);t.collections+=coll;if(coll)t.cColl++;var go=getCustGobackTotal(c);t.goback+=go;if(go)t.cGo++;var acct=getCustAcctTotal(c);t.acct+=acct;if(acct)t.cAcct++;var nr=getCustBuckets(c,true);if(nr.current>0)t.cCur++;if(nr.days30)t.c30++;if(nr.days60)t.c60++;if(nr.days90)t.c90++;if(nr.over90)t.cO90++;t.current+=nr.current;t.days30+=nr.days30;t.days60+=nr.days60;t.days90+=nr.days90;t.over90+=nr.over90;t.total+=c.total;});return t;}

  else if(currentFilter==="goback")list=list.filter(function(c){return getCustGobackTotal(c)>0;});
  else if(currentFilter==="acctreview")list=list.filter(function(c){return getCustAcctTotal(c)>0;});

function getExpectedDate(inv){
  var k=invKey(inv.customer,inv.num,inv.date);
  if(expectedDates[k])return parseDate(expectedDates[k]);
  // If not overdue, use due date
  var due=parseDate(inv.dueDate);
  if(!due)return null;
  var now=new Date();now.setHours(0,0,0,0);
  if(due>=now)return due;
  // Overdue with no expected date = null (unscheduled)
  return null;
}
function renderCFF(){

function rptFmt(n){if(n===0)return"$0";var neg=n<0;var a=Math.abs(n);if(a>=1000)return(neg?"-":"")+"$"+a.toLocaleString("en-US",{minimumFractionDigits:0,maximumFractionDigits:0});return(neg?"-":"")+"$"+a.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});}
function extractJobNum(s){var m=s.match(/^(\d{4,5})/);return m?m[1]:"";}
function parseTrackers(files){
  trackerData=[];var pending=files.length;
  Array.from(files).forEach(function(file){
    var reader=new FileReader();
    reader.onload=function(e){
      try{
        var data=new Uint8Array(e.target.result);var wb=XLSX.read(data,{type:"array"});
        wb.SheetNames.forEach(function(sn){
          if(sn==="Check List"||sn==="Forecast"||sn==="Forecast Instructions"||sn==="Forecast Directions")return;
          var ws=wb.Sheets[sn];var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
          var weekDate=null;
          for(var r=0;r<Math.min(5,rows.length);r++){for(var c2=0;c2<(rows[r]||[]).length;c2++){var v=rows[r][c2];if(v instanceof Date||(typeof v==="number"&&v>40000&&v<50000)){var d2=typeof v==="number"?new Date((v-25569)*86400000):v;if(String(rows[r][0]||"").trim()==="Billing Week"){weekDate=d2;break;}}};if(weekDate)break;}
          if(!weekDate)return;
          var hdrRow=-1;for(var r2=0;r2<Math.min(8,rows.length);r2++){if(String(rows[r2][0]||"").indexOf("Job")===0){hdrRow=r2;break;}}if(hdrRow<0)return;
          for(var r3=hdrRow+1;r3<rows.length;r3++){var rw=rows[r3];var job=String(rw[0]||"").trim();if(!job||job.indexOf("Total for")===0)continue;var amt=typeof rw[1]==="number"?rw[1]:(typeof rw[1]==="string"?parseFloat(rw[1].replace(/[^0-9.\-]/g,"")):(rw[1]||0));if(isNaN(amt))amt=0;var status=String(rw[4]||"").trim();if(status==="-"||!status)status="No Status";trackerData.push({week:weekDate,weekStr:toDateStr(weekDate),job:job,amount:amt,status:status,invoiceRef:String(rw[5]||"").trim(),notes:String(rw[6]||"").trim()});}
        });
      }catch(err){console.error("Tracker parse error:",err);}
      pending--;if(pending===0){if(activeTab==="health")renderHealthCheck();if(activeTab==="action")renderActionPlan();}
    };reader.readAsArrayBuffer(file);
  });
}
function buildAnomalies(){
  var anomalies=[];var today=new Date();
  customerList.forEach(function(c){c.invoices.forEach(function(inv){if(inv.type!=="Invoice"||inv.openBalance<=0)return;var d=parseDate(inv.date);if(!d)return;var age=Math.floor((today-d)/(1000*60*60*24));if(age>365){anomalies.push({type:"STALE INVOICE",severity:"HIGH",customer:c.name,detail:"Invoice #"+inv.num+" for "+rptFmt(inv.openBalance)+" from "+inv.date+" \u2014 "+(age>730?Math.floor(age/365)+" YEARS old":Math.floor(age/30)+" months old")+". "+inv.job,amount:inv.openBalance,action:age>730?"Likely uncollectable. Evaluate for write-off or send final demand letter.":"Escalate immediately. Collection likelihood drops each month."});}else if(age>180&&inv.openBalance<500){anomalies.push({type:"SMALL STALE BALANCE",severity:"MEDIUM",customer:c.name,detail:"Invoice #"+inv.num+" \u2014 "+rptFmt(inv.openBalance)+", "+age+" days past due",amount:inv.openBalance,action:"Write off. Not worth the phone call."});}});});
  customerList.forEach(function(c){c.invoices.forEach(function(inv){if(inv.openBalance>=0)return;anomalies.push({type:"CREDIT/OVERPAYMENT",severity:"MEDIUM",customer:c.name,detail:"Negative balance of "+rptFmt(inv.openBalance)+" \u2014 "+(inv.type||"")+" "+(inv.num?"#"+inv.num:"")+(inv.date?" from "+inv.date:""),amount:inv.openBalance,action:"Apply credit to open invoices or issue refund"});});});
  customerList.slice().sort(function(a,b){return b.total-a.total;}).forEach(function(c){if(c.total>25000){anomalies.push({type:"CONCENTRATION RISK",severity:"INFO",customer:c.name,detail:rptFmt(c.total)+" total open across "+c.invoices.filter(function(i){return i.openBalance>0;}).length+" invoices",amount:c.total,action:"Prioritize collection \u2014 large exposure"});}});
  var credits=[],debits=[];customerList.forEach(function(c){var cr=0,db=0;c.invoices.forEach(function(inv){if(inv.openBalance<0)cr+=inv.openBalance;else db+=inv.openBalance;});if(cr<-1000)credits.push({name:c.name,amount:cr});if(db>1000)debits.push({name:c.name,amount:db});});
  credits.forEach(function(cr){debits.forEach(function(db){if(cr.name===db.name)return;var cW=cr.name.toLowerCase().split(/\s+/);var dW=db.name.toLowerCase().split(/\s+/);var sh=cW.filter(function(w){return w.length>2&&dW.indexOf(w)>-1;});if(sh.length>0){anomalies.push({type:"POSSIBLE MISAPPLIED PAYMENT",severity:"HIGH",customer:cr.name+" / "+db.name,detail:cr.name+" has a "+rptFmt(Math.abs(cr.amount))+" credit. "+db.name+" owes "+rptFmt(db.amount)+". Check if payment was applied to wrong customer.",amount:Math.abs(cr.amount),action:"In QB: open "+cr.name+"'s account, check if payments should apply to "+db.name+"'s invoices. Could clear "+rptFmt(Math.min(Math.abs(cr.amount),db.amount))+" instantly."});}});});
  return anomalies;

function buildTrackerFindings(){

    var ongoing=j.entries.filter(function(e){return e.status.indexOf("On Going")>-1||e.status.indexOf("nothing to bill")>-1;});if(ongoing.length>=3){findings.push({type:"BILLING STALL",severity:"MEDIUM",customer:j.job,detail:"\"Nothing to bill\" for "+ongoing.length+" weeks. Last: "+ongoing[ongoing.length-1].weekStr,amount:0,action:"Check if work is happening. If yes, investigate billing blockage."});}});
  var recentWeeks=trackerData.map(function(t){return t.week.getTime();});var maxWeek=new Date(Math.max.apply(null,recentWeeks));
  trackerData.filter(function(t){return t.week.getTime()===maxWeek.getTime()&&(t.status==="No Status"||t.status==="-");}).forEach(function(j){findings.push({type:"UNBILLED THIS WEEK",severity:"HIGH",customer:j.job,detail:"On this week's tracker ("+j.weekStr+") with no billing status",amount:j.amount||0,action:"Bill this job or set a status"});});
  var qbJobNums={};allInvoices.forEach(function(inv){var jn=extractJobNum(inv.job||inv.num||"");if(jn)qbJobNums[jn]=true;var jn2=extractJobNum(inv.fullName||"");if(jn2)qbJobNums[jn2]=true;});
  Object.keys(byJob).forEach(function(jn){var j=byJob[jn];var sent=j.entries.filter(function(e){return e.status.indexOf("Invoice Sent")>-1&&e.amount>0;});if(sent.length>0&&!qbJobNums[jn]){var tot=sent.reduce(function(s,e){return s+e.amount;},0);if(tot>0){findings.push({type:"TRACKER/QB MISMATCH",severity:"HIGH",customer:j.job,detail:"Tracker shows "+rptFmt(tot)+" invoiced but no matching job in QB",amount:tot,action:"Check if invoice was entered in QB."});}}});
  return findings;
}
function rptOpenDetail(name){

// === FOLLOW-UP ENGINE ===
function buildFollowUps(){
  var fups=[];var today=new Date();var now=Date.now();var DAY=86400000;
  customerList.forEach(function(c){c.invoices.forEach(function(inv){
    if(inv.openBalance<=0)return;
    if(isCollections(inv,c.name))return;
    var k=invKey(c.name,inv.num,inv.date);
    var invNotes=notes[k]||[];
    var lastNote=invNotes.length?invNotes.reduce(function(a,b){return a.ts>b.ts?a:b;}):null;
    var lastOutreach=null;
    for(var i=invNotes.length-1;i>=0;i--){if(invNotes[i].outreach!==undefined){lastOutreach=invNotes[i];break;}}
    var expDate=expectedDates[k]?parseDate(expectedDates[k]):null;
    var invDate=parseDate(inv.dueDate||inv.date);
    var age=invDate?Math.floor((today-invDate)/DAY):0;
    var isRet=isRetention(inv,c.name);
    var isGb=isGoback(inv,c.name);
    // 1. Missed expected payment
    if(expDate&&expDate<today){
      var daysLate=Math.floor((today-expDate)/DAY);
      fups.push({customer:c.name,inv:inv,urgency:daysLate>7?1:2,reason:"Expected payment missed"+(daysLate>1?" ("+daysLate+" days ago)":""),action:"Call to follow up on missed payment",type:"missed_payment"});
    }
    // 2. Email sent, no response in 7+ days
    if(lastOutreach&&(now-lastOutreach.ts)>7*DAY){
      var daysSince=Math.floor((now-lastOutreach.ts)/DAY);
      var lastTier=lastOutreach.outreach;
      var nextLabel=lastTier===0?"1st Polite":lastTier===1?"2nd Clear":lastTier===2?"3rd Serious":"Final demand";
      var noNewAction=!lastNote||lastNote.ts<=lastOutreach.ts;
      if(noNewAction){fups.push({customer:c.name,inv:inv,urgency:lastTier>=2?1:2,reason:"No response to email ("+daysSince+" days)",action:"Escalate to "+nextLabel,type:"email_escalation"});}
    }
    // 3. Stale note - last activity 10+ days, no outreach after it
    if(lastNote&&(now-lastNote.ts)>10*DAY){
      var newerOutreach=lastOutreach&&lastOutreach.ts>lastNote.ts;
      if(!newerOutreach){
        var daysSinceNote=Math.floor((now-lastNote.ts)/DAY);
        fups.push({customer:c.name,inv:inv,urgency:3,reason:"Last note "+daysSinceNote+" days ago",action:"Check status, update notes",type:"stale_note"});
      }
    }
    // 4. Overdue 30+ days, zero action taken
    if(age>30&&!lastNote&&!lastOutreach&&!expDate&&!isRet&&!isGb){
      fups.push({customer:c.name,inv:inv,urgency:age>60?1:2,reason:age+" days overdue, no action taken",action:age>60?"Urgent: start collection now":"Send first collection email",type:"no_action"});
    }
    // 5. Retention release check at 90+ days
    if(isRet&&age>90){
      fups.push({customer:c.name,inv:inv,urgency:3,reason:"Retention held "+age+" days",action:"Check if project complete, request release",type:"retention_check"});
    }
  });});
  // Sort: urgency 1 first, then amount desc
  fups.sort(function(a,b){if(a.urgency!==b.urgency)return a.urgency-b.urgency;return b.inv.openBalance-a.inv.openBalance;});
  // Dedupe per invoice - keep highest urgency
  var seen={};var deduped=[];
  fups.forEach(function(f){var k=invKey(f.customer,f.inv.num,f.inv.date);if(!seen[k]){seen[k]=true;deduped.push(f);}});
  return deduped;
}

  h+='.print-bar{padding:16px 40px;text-align:right;background:#faf8f5;border-bottom:1px solid #e5e2dd}';

  h+='@media print{.print-bar{display:none}body{background:#fff;padding:0}.container{box-shadow:none;border-radius:0}}';
  h+='</style></head><body><div class="container">';

// === FILE HANDLING ===
function handleFile(file){
  document.getElementById("upload-label").textContent="Processing...";
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=new Uint8Array(e.target.result);var wb=XLSX.read(data,{type:"array"});
      var sheet=wb.Sheets[wb.SheetNames[0]];var rows=XLSX.utils.sheet_to_json(sheet,{header:1,defval:null});
      var dateLine=rows[2]?(rows[2][0]||"").toString():"";
      document.getElementById("report-date").textContent="as of "+dateLine.replace("As of ","");
      customerList=parseDetailReport(rows);
      if(!customerList.length){document.getElementById("upload-error").textContent="No transactions found.";document.getElementById("upload-error").classList.remove("hidden");document.getElementById("upload-label").textContent="Click to upload your QB A/R Aging Detail Report";return;}
      document.getElementById("grand-total").textContent=fmt(customerList.reduce(function(s,c){return s+c.total;},0));
      document.getElementById("upload-screen").classList.add("hidden");document.getElementById("dashboard").classList.remove("hidden");
      currentFilter="all";searchTerm="";sortBy="total";sortDir="desc";document.getElementById("search-input").value="";
      saveReportData();
      switchTab("aging");
    }catch(err){document.getElementById("upload-error").textContent="Error: "+err.message;document.getElementById("upload-error").classList.remove("hidden");document.getElementById("upload-label").textContent="Click to upload your QB A/R Aging Detail Report";}
  };reader.readAsArrayBuffer(file);
}

// === EVENTS ===
document.getElementById("file-input").addEventListener("change",function(e){if(e.target.files[0])handleFile(e.target.files[0]);});
document.getElementById("new-report-input").addEventListener("change",function(e){if(e.target.files[0])handleFile(e.target.files[0]);});
document.getElementById("search-input").addEventListener("input",function(e){searchTerm=e.target.value;renderTable();});
document.querySelectorAll(".t-header div[data-sort]").forEach(function(el){el.addEventListener("click",function(){var col=el.dataset.sort;if(sortBy===col)sortDir=sortDir==="desc"?"asc":"desc";else{sortBy=col;sortDir="desc";}renderTable();renderSortArrows();});});
document.getElementById("overlay").addEventListener("click",function(){closeDetail();var fp=document.getElementById('fup-panel');if(fp)fp.classList.remove('fup-open');});
  document.addEventListener('click',function(e){var fp=document.getElementById('fup-panel');var fw=document.querySelector('.fup-wrap');if(fp&&fw&&!fw.contains(e.target))fp.classList.remove('fup-open');});
document.getElementById("close-detail").addEventListener("click",closeDetail);
document.getElementById("save-email-btn").addEventListener("click",function(){if(selectedCustomer){custEmails[selectedCustomer.name]=document.getElementById("cust-email").value.trim();saveEmails();renderDetailContent();}});
document.getElementById("cust-email").addEventListener("keydown",function(e){if(e.key==="Enter"&&selectedCustomer){custEmails[selectedCustomer.name]=document.getElementById("cust-email").value.trim();saveEmails();renderDetailContent();}});
document.querySelectorAll(".tab-btn").forEach(function(b){b.addEventListener("click",function(){switchTab(b.dataset.tab);});});
loadStorage();
// Auto-restore last report if available
if(loadReportData()){
  document.getElementById("upload-screen").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");
  currentFilter="all";searchTerm="";sortBy="total";sortDir="desc";
  switchTab("aging");
}
</script>
